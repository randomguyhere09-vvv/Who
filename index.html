<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scratch My Love 💖</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
  body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4,#fbc2eb);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .hearts span{
    position:absolute;
    display:block;
    width:20px;
    height:20px;
    background:rgba(255,255,255,0.6);
    transform:rotate(45deg);
    animation:float 10s linear infinite;
  }
  .hearts span::before,
  .hearts span::after{
    content:'';
    position:absolute;
    width:20px;
    height:20px;
    background:rgba(255,255,255,0.6);
    border-radius:50%;
  }
  .hearts span::before{top:-10px;left:0}
  .hearts span::after{left:-10px;top:0}
  @keyframes float{
    0%{transform:translateY(100vh) rotate(45deg);opacity:1}
    100%{transform:translateY(-10vh) rotate(45deg);opacity:0}
  }
  .card{
    position:relative;
    width:320px;
    height:420px;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
    background:#fff;
  }
  .message{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    color:#ff5e9c;
    font-weight:600;
    z-index:1;
  }
  .pearl{
    position:absolute;
    width:120px;
    height:120px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%,#fff,#e0e0e0,#bfbfbf);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    box-shadow:0 0 40px rgba(255,255,255,0.8);
    transition:0.6s ease;
  }
  .loveText{
    position:absolute;
    bottom:40px;
    width:100%;
    text-align:center;
    color:#ff4d88;
    font-size:20px;
    opacity:0;
    transition:0.6s ease;
  }
  canvas{
    position:absolute;
    top:0;
    left:0;
  }
</style>
</head>
<body>
<div class="hearts"></div>
<div class="card">
  <div class="message">Scratch me ❤️</div>
  <div class="pearl" id="pearl"></div>
  <div class="loveText" id="loveText">You are my precious pearl 💌</div>
  <canvas id="scratch"></canvas>
</div>
<script>
for(let i=0;i<20;i++){
  let span=document.createElement('span');
  span.style.left=Math.random()*100+'vw';
  span.style.animationDuration=(5+Math.random()*5)+'s';
  document.querySelector('.hearts').appendChild(span);
}
let canvas=document.getElementById('scratch');
let ctx=canvas.getContext('2d');
canvas.width=320;
canvas.height=420;
ctx.fillStyle='#ffc0cb';
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.globalCompositeOperation='destination-out';
let drawing=false;
function scratch(e){
  if(!drawing)return;
  let rect=canvas.getBoundingClientRect();
  let x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
  let y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
  ctx.beginPath();
  ctx.arc(x,y,20,0,Math.PI*2);
  ctx.fill();
}
canvas.addEventListener('mousedown',()=>drawing=true);
canvas.addEventListener('mouseup',()=>drawing=false);
canvas.addEventListener('mousemove',scratch);
canvas.addEventListener('touchstart',()=>drawing=true);
canvas.addEventListener('touchend',()=>drawing=false);
canvas.addEventListener('touchmove',scratch);
function checkReveal(){
  let pixels=ctx.getImageData(0,0,canvas.width,canvas.height);
  let count=0;
  for(let i=3;i<pixels.data.length;i+=4){
    if(pixels.data[i]==0)count++;
  }
  if(count>pixels.data.length/12){
    document.getElementById('pearl').style.transform='translate(-50%,-50%) scale(1)';
    document.getElementById('loveText').style.opacity=1;
    canvas.style.opacity=0;
  }
}
setInterval(checkReveal,800);
</script>
</body>
</html>
